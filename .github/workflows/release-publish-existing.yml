name: Publish Existing Release Assets

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        default: "v0.3.0"
      source_run_id:
        description: "Workflow run id containing beellama-release-assets"
        required: true
        default: "26878136155"
      artifact_name:
        description: "Release asset bundle artifact name"
        required: true
        default: "beellama-release-assets"

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-existing-release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish existing release assets
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ inputs.tag_name }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ./release-bundle
          run-id: ${{ inputs.source_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$(find release-bundle -type f -name release-notes.md | head -n 1)"
          if [[ -z "${notes_file}" ]]; then
            echo "release-notes.md not found in release asset bundle" >&2
            exit 1
          fi

          mapfile -t release_files < <(find release-bundle -type f ! -name release-notes.md | sort)
          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No release files found in release asset bundle" >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${release_files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
            gh release edit "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" "${release_files[@]}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}" --notes-file "${notes_file}" --verify-tag
          fi

          gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}"
